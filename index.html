<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التفعيل - Smart Expiry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 40px 30px;
            text-align: center;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4CAF50;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        
        .content h2 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .content p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin: 5px;
        }
        
        .btn:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .footer {
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
    <!-- خط Cairo للعربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Smart Expiry</h1>
            <p>تم تفعيل حسابك بنجاح!</p>
        </div>
        
        <div class="content">
            <div class="success-icon">✓</div>
            <h2>مرحباً بك! 🎉</h2>
            <p>تم تفعيل بريدك الإلكتروني بنجاح.<br>يمكنك الآن العودة إلى التطبيق وتسجيل الدخول.</p>
            
            <a href="myapp://login" class="btn">📱 فتح التطبيق</a>
        </div>
        
        <div class="footer">
            © 2026 Smart Expiry - جميع الحقوق محفوظة
        </div>
    </div>
    
    <script>
        // محاولة فتح التطبيق تلقائياً بعد 3 ثوان
        setTimeout(() => {
            window.location.href = 'myapp://login?confirmed=true';
        }, 3000);
    </script>
</body>
</html>
