<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الحساب - متجري</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 18px;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }
        .success {
            color: #4CAF50;
        }
        .error {
            color: #f44336;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #4CAF50;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>تم تأكيد الحساب بنجاح!</h1>
        <p>تم تفعيل حسابك في متجرنا. يمكنك الآن العودة إلى التطبيق وتسجيل الدخول.</p>
        <a href="com.yourcompany.ecommerce_app://login-callback" class="button">فتح التطبيق</a>
        <p style="margin-top: 20px; font-size: 14px; color: #999;">
            إذا لم يفتح التطبيق تلقائياً، تأكد من تثبيت التطبيق على هاتفك
        </p>
        <div id="status"></div>
    </div>

    <script>
        // محاولة فتح التطبيق تلقائياً
        window.onload = function() {
            // استخراج الـ token من الرابط
            const urlParams = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = urlParams.get('access_token');
            const refreshToken = urlParams.get('refresh_token');
            const type = urlParams.get('type');
            
            if (type === 'signup' || type === 'recovery') {
                document.getElementById('status').innerHTML = 
                    '<p class="success">جاري تحويلك إلى التطبيق...</p><div class="loader"></div>';
                
                // محاولة فتح التطبيق
                setTimeout(function() {
                    window.location.href = 'com.yourcompany.ecommerce_app://login-callback#' + 
                        window.location.hash.substring(1);
                }, 1000);
            }
        };
    </script>
</body>
</html>
